name: Inspect racing.com NEXT_DATA

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Inspect __NEXT_DATA__
        run: python inspect_racing_com_nextdata.py

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: racing-com-nextdata
          path: diagnose_output/

      - name: Commit
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add diagnose_output/
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: racing.com __NEXT_DATA__ analysis"
            git push
          fi