name: Test Scraper Extractability

# 手動觸發即可，不排程
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write   # 為了把報告 commit 回 repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 先裝你 main.py 用的依賴（scrapers 可能會 import 這些）
          pip install pandas requests beautifulsoup4 lxml google-generativeai
          # 測試腳本本身的依賴
          pip install trafilatura

      - name: Run extractability test
        run: python test_scraper_extractability.py

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extractability-report
          path: extractability_report.md
          retention-days: 30

      - name: Commit report back to repo
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extractability_report.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update extractability report"
            git push
          fi
