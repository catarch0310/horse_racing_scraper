name: Diagnose Round 2

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml cloudscraper

      - name: Run diagnostic round 2
        run: python diagnose_round2.py

      - name: Upload diagnose output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnose-round2
          path: diagnose_output/
          retention-days: 30

      - name: Commit diagnose output
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add diagnose_output/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update diagnose round 2 output"
            git push
          fi
